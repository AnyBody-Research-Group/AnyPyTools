name: Build
on:
  workflow_dispatch: {}
  pull_request:
  push:
    branches:
      - master
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: build
      - name: Build pypi wheel/sdist
        run: pixi run -e build build
      - name: Check package
        run: pixi run -e build check-wheel
      - name: Upload pypi package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pypi-artifact
          path: dist/*

  pypi-release:
    name: Publish package to pypi
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/anypytools
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-artifact
          path: dist
      - name: Publish package on PyPi
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
      - name: Create issue on Conda-forge feedstock
        uses: peter-evans/create-issue-from-file@v6
        with:
          token: ${{ secrets.TOKEN_FEEDSTOCK_UPDATE }}
          repository: conda-forge/anypytools-feedstock
          title: "@conda-forge-admin, please update version"
